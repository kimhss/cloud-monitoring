services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-cloud
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=native-histograms"
    ports:
      - "9090:9090"
    volumes:
      - ${PWD}/docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data_cloud:/prometheus
    networks: [perf, app-network]

  loki:
    image: grafana/loki:latest
    container_name: loki-cloud
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ${PWD}/docker/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data_cloud:/tmp/loki
    networks: [perf, app-network]

  promtail:
    image: grafana/promtail:latest
    container_name: promtail-cloud
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ${PWD}/docker/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks: [perf, app-network]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-cloud
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: Asia/Seoul
    ports:
      - "3000:3000"
    volumes:
      - grafana_data_cloud:/var/lib/grafana
      - ${PWD}/docker/monitoring/grafana/provisioning-cloud:/etc/grafana/provisioning
      - ${PWD}/docker/monitoring/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    networks: [perf]

networks:
  perf:
    external: true
    name: perf-network
  app-network:
    external: true
    name: app-network

volumes:
  prom_data_cloud:
  grafana_data_cloud:
  loki_data_cloud:
